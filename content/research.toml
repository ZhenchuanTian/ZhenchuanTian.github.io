type = "card"
title = "Research"
description = "My work focuses on perovskite photovoltaics — from material design and device engineering to advanced operando characterisation."

[[items]]
title = "Wide-Bandgap Perovskite Top Cells"
subtitle = "Halide Perovskites · Phase Stability"
content = "Engineering high-Br mixed-halide perovskites (Eg ≥ 1.7 eV) with suppressed phase segregation under prolonged illumination — a key stability bottleneck for tandem architectures."
tags = ["Wide-Bandgap", "Phase Stability", "Tandem-Ready"]

[[items]]
title = "All-Perovskite Tandem Devices"
subtitle = "2-Terminal Monolithic Tandems · >28% PCE"
content = "Monolithic 2-terminal all-perovskite tandems coupling wide-Eg and narrow-Eg subcells via ALD-based tunneling recombination junctions (TRJ). Contributed to devices exceeding 28% PCE and a certified result >30%."
tags = ["Tandem", "ALD", "High Efficiency"]

[[items]]
title = "Operando Characterisation & Stability"
subtitle = "ISOS Protocols · In-Situ Measurements"
content = "Real-time stability tracking using custom-built in-situ PL platforms under ISOS protocols (L-1, D-1, T-1); J-V, SPO, MPPT correlating structural evolution with device degradation pathways."
tags = ["Operando", "ISOS", "Stability", "In-Situ PL"]

